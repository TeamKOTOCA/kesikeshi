<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Copy BG Remover</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; }
        #resultCanvas { max-width: 100%; margin-top: 20px; border-radius: 8px; display: none; background-image:
            linear-gradient(45deg, #ccc 25%, transparent 25%),
            linear-gradient(-45deg, #ccc 25%, transparent 25%),
            linear-gradient(45deg, transparent 75%, #ccc 75%),
            linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px; }
        .status { margin: 15px 0; color: #555; font-weight: bold; }
        input[type="file"] { margin-bottom: 20px; }
        select { width: 100%; padding: 0.6rem 0.8rem; border-radius: 8px; border: 1px solid #ccc; margin-top: 0.5rem; background: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zero-Copy 背景除去 (On-Device)</h1>
        <p style="font-size: 0.9rem; color: #888;">Transformers.js v4 と WebAssembly/WebGPU を使って、ブラウザ上で透明背景を生成します。</p>
        
        <input type="file" id="fileInput" accept="image/*">
        <div id="status" class="status">画像を選択してください</div>
        <select id="model_list">
            <option selected disabled>モデルを読み込み中...</option>
        </select>
        
        <canvas id="resultCanvas"></canvas>
    </div>

    <script type="module">
        const worker = new Worker('worker.js', { type: 'module' });
        const fileInput = document.getElementById('fileInput');
        const modellist_ui = document.getElementById('model_list');
        const status = document.getElementById('status');
        const resultCanvas = document.getElementById('resultCanvas');
        const ctx = resultCanvas.getContext('2d');
        let now_model = null;

        const modellist = {
            "modnet": {
                path: "Xenova/modnet",
                description: "軽量かつ高速",
                device: "wasm",
                dtype: "q8"
            },
            "test": {
                path: "briaai/RMBG-1.4",
                description: "高品質",
                device: "wasm",
                dtype: "fp32"
            }
        };

        const formatModelLabel = (model) => {
            const deviceLabel = model.device === 'webgpu' ? 'WEBGPU' : 'WASM';
            const dtypeLabel = model.dtype ? model.dtype.toUpperCase() : 'AUTO';
            return `${deviceLabel} ${dtypeLabel}`;
        };

        document.addEventListener('DOMContentLoaded', async () => {
            modellist_ui.innerHTML = '';

            Object.entries(modellist).forEach(([key, model]) => {
                const opt = document.createElement('option');
                opt.value = model.path;
                opt.textContent = `${key} (${model.description}) ・ ${formatModelLabel(model)}`;
                modellist_ui.appendChild(opt);
            });

            if (modellist_ui.options.length > 0) {
                modellist_ui.selectedIndex = 0;
            }
            await updateNowModel();
        });

        async function updateNowModel() {
            const selectedPath = modellist_ui.value;
            now_model = Object.values(modellist).find(m => m.path === selectedPath);
        }
        
        fileInput.addEventListener('change', async () => {
            await sendtoworker();
        });
        modellist_ui.addEventListener('change', async () => {
            await updateNowModel();
            await sendtoworker();
        });
        
        async function sendtoworker() {
            const file = fileInput.files?.[0];
            if (!file || !now_model) return;

            status.textContent = "画像を準備しています...";
            
            const bitmap = await createImageBitmap(file);
            const { width, height } = bitmap;
            const offscreen = new OffscreenCanvas(width, height);
            const offCtx = offscreen.getContext('2d');
            offCtx.drawImage(bitmap, 0, 0);
            
            const imageData = offCtx.getImageData(0, 0, width, height);
            const buffer = imageData.data.buffer;

            const deviceLabel = now_model.device === 'webgpu' ? 'WebGPU' : 'WASM';
            const dtypeLabel = now_model.dtype ? now_model.dtype.toUpperCase() : 'AUTO';
            status.textContent = `${now_model.path} を ${deviceLabel}/${dtypeLabel} で推論中...`;
            
            worker.postMessage({ 
                buffer, 
                width, 
                height,
                modelPath: now_model.path,
                device: now_model.device,
                dtype: now_model.dtype
            }, [buffer]);
        }
        worker.onmessage = (e) => {
            const { outputBuffer, width, height, error } = e.data;
            
            if (error) {
                err(error);
                return;
            }

            resultCanvas.width = width;
            resultCanvas.height = height;

            const outputImageData = new ImageData(
                new Uint8ClampedArray(outputBuffer), 
                width, 
                height
            );
            ctx.putImageData(outputImageData, 0, 0);

            resultCanvas.style.display = 'block';
            status.textContent = "背景切り抜きが完了しました";
        };

        function err(e) {
            status.textContent = "エラー: " + e;
            console.error(e);
        }
    </script>
</body>
</html>
