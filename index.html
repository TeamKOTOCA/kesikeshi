<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Copy BG Remover</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; }
        #resultCanvas { max-width: 100%; margin-top: 20px; border-radius: 8px; display: none; background-image: 
            linear-gradient(45deg, #ccc 25%, transparent 25%), 
            linear-gradient(-45deg, #ccc 25%, transparent 25%), 
            linear-gradient(45deg, transparent 75%, #ccc 75%), 
            linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px; } /* 透過確認用の市松模様 */
        .status { margin: 15px 0; color: #555; font-weight: bold; }
        input[type="file"] { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>背景除去 (On-Device)</h1>
        <p style="font-size: 0.9rem; color: #888;">画像データはサーバーに送信されません</p>
        
        <input type="file" id="fileInput" accept="image/*">
        <div id="status" class="status">画像をアップロードしてください</div>
        <select name="" id="model_list">
            <option value="no">モデルが読み込めません...</option>
        </select>
        
        <canvas id="resultCanvas"></canvas>
    </div>

    <script type="module">
        const worker = new Worker('worker.js', { type: 'module' });
        const fileInput = document.getElementById('fileInput');
        const modellist_ui = document.getElementById('model_list');
        const status = document.getElementById('status');
        const resultCanvas = document.getElementById('resultCanvas');
        const ctx = resultCanvas.getContext('2d');
        let now_model = null;

        // 1. 扱いやすいオブジェクト形式
        const modellist = {
            "modnet": {
                path: "Xenova/modnet",
                description: "速い",
                webgpu: false,
                quantized: true
            },
            "segformer-b5": {
                path: "onnx-community/BiRefNet-ONNX",
                description: "最新の超高精度モデル",
                webgpu: false,
                quantized: false
            }
        };

        document.addEventListener('DOMContentLoaded', async () => {
            modellist_ui.innerHTML = '';

            Object.entries(modellist).forEach(([key, model]) => {
                const opt = document.createElement('option');
                opt.value = model.path;
                opt.textContent = `${key} (${model.description})`;
                modellist_ui.appendChild(opt);
            });
            await updateNowModel();
        });

        async function updateNowModel() {
            const path = modellist_ui.value;
            now_model = Object.values(modellist).find(m => m.path === path);
        }
        
        fileInput.addEventListener('change', async (e) => {
            await sendtoworker();
        });
        modellist_ui.addEventListener('change', async (e) => {
            await updateNowModel();
            await sendtoworker();
        });
        
        async function sendtoworker(){
            const file = fileInput.files[0];
            if (!file || !now_model) return;

            status.textContent = "読み込み中...";
            
            const bitmap = await createImageBitmap(file);
            const { width, height } = bitmap;
            const offscreen = new OffscreenCanvas(width, height);
            const offCtx = offscreen.getContext('2d');
            offCtx.drawImage(bitmap, 0, 0);
            
            const imageData = offCtx.getImageData(0, 0, width, height);
            const buffer = imageData.data.buffer;

            status.textContent = `${now_model.path} で実行中...`;
            
            // 3. now_model の情報を使ってシンプルに送信
            worker.postMessage({ 
                buffer, 
                width, 
                height,
                modelPath: now_model.path,
                webgpu: now_model.webgpu
            }, [buffer]);
        }
        worker.onmessage = (e) => {
            const { outputBuffer, width, height, error } = e.data;
            
            if (error) {
                err(error);
                return;
            }

            resultCanvas.width = width;
            resultCanvas.height = height;

            const outputImageData = new ImageData(
                new Uint8ClampedArray(outputBuffer), 
                width, 
                height
            );
            ctx.putImageData(outputImageData, 0, 0);

            resultCanvas.style.display = 'block';
            status.textContent = "完了！";
        };

        function err(e) {
            status.textContent = "エラー: " + e;
            console.error(e);
        }
    </script>
</body>
</html>
